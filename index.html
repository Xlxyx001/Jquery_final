<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestionnaire Étudiants</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

  <!-- Feuille de style -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ===== EN-TÊTE ===== -->
  <header class="header">
    <div>
      <h1 class="header-title">GESTIONNAIRE ÉTUDIANTS</h1>
    </div>
  </header>

  <!-- ===== CONTENU PRINCIPAL ===== -->
  <main class="main-container">

    <!-- CARTE FORMULAIRE -->
    <section class="card form-card">
      <h2 class="card-title">Ajouter un étudiant</h2>

      <div class="form-grid">

        <!-- Colonne gauche : champs -->
        <div class="form-fields">

          <div class="field-group">
            <label for="nom" class="field-label">Nom complet :</label>
            <input
              type="text"
              id="nom"
              class="field-input"
              placeholder="Entrez votre nom"
              autocomplete="off"
            />
          </div>

          <div class="field-group">
            <label for="note" class="field-label">Note :</label>
            <input
              type="number"
              id="note"
              class="field-input"
              placeholder="Entrez votre note (/20)"
              min="0"
              max="20"
            />
          </div>

          <!-- Message d'erreur -->
          <p id="erreur" class="erreur-msg" style="display:none;"></p>

        </div>

        <!-- Colonne droite : boutons -->
        <div class="form-actions">
          <button id="btn-ajouter" class="btn btn-primary">
            <span class="btn-icon"></span> Valider
          </button>
          <button id="btn-vider" class="btn btn-secondary">
            <span class="btn-icon"></span> Vider les champs
          </button>
          <button id="btn-effacer-tout" class="btn btn-danger">
            <span class="btn-icon"></span> Tout effacer
          </button>
        </div>

      </div>
    </section>

    <!-- CARTE LISTE -->
    <section class="card list-card">
      <h2 class="card-title">Liste des étudiants</h2>

      <!-- Stats rapides -->
      <div id="stats" class="stats-bar"></div>

      <!-- Tableau -->
      <div class="table-wrapper">
        <table class="student-table">
          <thead>
            <tr>
              <th>Nom</th>
              <th>Note</th>
              <th>Date d'Ajout</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="liste-etudiants">
            <!-- Lignes générées dynamiquement par jQuery -->
          </tbody>
        </table>

        <!-- Message liste vide -->
        <div id="liste-vide" class="liste-vide" style="display:none;">
          <p>Aucun étudiant enregistré.</p>
        </div>
      </div>

    </section>

  </main>

  <!-- ===== MODAL MODIFICATION ===== -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3 class="modal-title"> Modifier la note</h3>
      <p id="modal-nom-etudiant" class="modal-nom"></p>
      <label for="modal-note" class="field-label">Nouvelle note :</label>
      <input
        type="number"
        id="modal-note"
        class="field-input"
        min="0"
        max="20"
        placeholder="0-20"
      />
      <p id="modal-erreur" class="erreur-msg" style="display:none;"></p>
      <div class="modal-actions">
        <button id="modal-confirmer" class="btn btn-primary"> Confirmer</button>
        <button id="modal-annuler"   class="btn btn-secondary">Annuler</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST NOTIFICATION ===== -->
  <div id="toast" class="toast" style="display:none;"></div>

  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Logique applicative -->
  <script src="app.js"></script>

</body>
</html>
